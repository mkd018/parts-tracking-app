<!DOCTYPE html>
<html lang="tr">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Parts Tracking</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
background:#2e7dff;
color:white;
border:none;
border-radius:6px;
font-size:18px;
}

.result{
margin-top:20px;
padding:10px;
background:#eef3ff;
border-radius:6px;
}

</style>

</head>


<body>

<div class="container">

<h1>Parts Tracking</h1>

<label>TV</label>
<select id="tv">
<option>TV1</option>
<option>TV2</option>
<option>TV3</option>
</select>


<label>SHIP</label>
<select id="ship">
<option>Ship A</option>
<option>Ship B</option>
</select>


<label>SWBS</label>
<select id="swbs">
<option>100</option>
<option>200</option>
</select>


<label>Operation</label>
<select id="operation">
<option>Assembly</option>
<option>Install</option>
<option>Test</option>
</select>


<label>Part Number</label>
<input id="partNumber">


<label>Quantity</label>
<input id="qty" type="number">


<label>User</label>
<input id="user">


<button onclick="saveData()">Save</button>

<div class="result" id="result">System ready</div>

</div>



<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyu0BEfSXT1Tn1xevcFRlJb7sBHxfXsSmH4bC_9c1l1AFA3wKPpa_DE9qG5U9VhUrdBwg/exec";


async function saveData(){

const tv=document.getElementById("tv").value;

const ship=document.getElementById("ship").value;

const swbs=document.getElementById("swbs").value;

const operation=document.getElementById("operation").value;

const partNumber=document.getElementById("partNumber").value;

const qty=document.getElementById("qty").value;

const user=document.getElementById("user").value;


const now=new Date();

const day=String(now.getDate()).padStart(2,'0');

const month=String(now.getMonth()+1).padStart(2,'0');

const year=now.getFullYear();

const hour=String(now.getHours()).padStart(2,'0');

const min=String(now.getMinutes()).padStart(2,'0');

const sec=String(now.getSeconds()).padStart(2,'0');


const date=day+"."+month+"."+year;

const time=hour+":"+min+":"+sec;


const payload={
tv:tv,
ship:ship,
swbs:swbs,
operation:operation,
partNumber:partNumber,
qty:qty,
user:user,
date:date,
time:time
};


document.getElementById("result").innerText="Saving...";


const response=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});


const data=await response.json();


if(data.success){

document.getElementById("result").innerText="Saved";

document.getElementById("partNumber").value="";

document.getElementById("qty").value="";

}else{

document.getElementById("result").innerText="Error";

}

}

</script>


</body>
</html>
