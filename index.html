<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parts Tracking Debug</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:16px;
    }
    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:18px;
      border-radius:12px;
      box-shadow:0 0 12px rgba(0,0,0,0.08);
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:6px;
      margin-bottom:12px;
      border-radius:6px;
      border:1px solid #ccc;
      box-sizing:border-box;
      font-size:16px;
    }
    button{
      background:#2e7dff;
      color:white;
      border:none;
      cursor:pointer;
    }
    .result{
      margin-top:10px;
      padding:12px;
      border-radius:8px;
      background:#eef3ff;
      min-height:20px;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Kayıt Testi</h1>

  <label>Ad Soyad</label>
  <input id="fullName" type="text" placeholder="Ad Soyad">

  <label>Sicil</label>
  <input id="sicil" type="text" placeholder="Sicil">

  <label>Şifre</label>
  <input id="password" type="password" placeholder="Şifre">

  <button onclick="testRegister()">Kayıt Testi Yap</button>

  <div class="result" id="resultBox">Hazır</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby4NoRuMybMk1dNsjpKjPsDZZcU3h2MoS93RdzZ7RB9A26dqPZLpIXMGIUnQ81gOTnxLQ/exec";

async function testRegister(){
  const fullName = document.getElementById("fullName").value.trim();
  const sicil = document.getElementById("sicil").value.trim();
  const password = document.getElementById("password").value.trim();
  const resultBox = document.getElementById("resultBox");

  if(!fullName || !sicil || !password){
    resultBox.innerText = "Ad Soyad, Sicil ve Şifre zorunlu";
    return;
  }

  try{
    resultBox.innerText = "İstek gönderiliyor...";

    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        action: "register",
        fullName: fullName,
        sicil: sicil,
        password: password
      })
    });

    const text = await response.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch(parseError){
      resultBox.innerText = "JSON parse hatası\n\nHam cevap:\n" + text;
      return;
    }

    resultBox.innerText =
      "HTTP Status: " + response.status + "\n\n" +
      "Backend cevabı:\n" +
      JSON.stringify(data, null, 2);

  }catch(error){
    resultBox.innerText = "Fetch hatası:\n" + error.message;
  }
}
</script>
</body>
</html>
