<!DOCTYPE html>
<html lang="tr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Parts Tracking System</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7dff">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:16px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:20px;
}

.header img{
width:42px;
height:42px;
border-radius:8px;
}

h1{
margin:0;
font-size:26px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2e7dff;
color:white;
border:none;
}

.card{
background:#fafafa;
border-radius:8px;
padding:16px;
margin-bottom:16px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.result{
margin-top:10px;
padding:10px;
background:#eef3ff;
border-radius:6px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="icon-512.png">
<h1>Parts Tracking System</h1>
</div>

<div id="authScreen">

<div class="row">

<div class="card">

<h2>Giriş Yap</h2>

<input id="loginSicil" placeholder="Sicil">

<input id="loginPassword" type="password" placeholder="Şifre">

<button onclick="login()">Giriş</button>

<div class="result" id="loginResult"></div>

</div>

<div class="card">

<h2>Kayıt Ol</h2>

<input id="regFullName" placeholder="Ad Soyad">

<input id="regSicil" placeholder="Sicil">

<input id="regPassword" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>

<div class="result" id="registerResult"></div>

</div>

</div>

</div>

<div id="appScreen" class="hidden">

<div class="card">

<h2>Parça Giriş</h2>

<select id="tv"></select>

<select id="ship"></select>

<select id="swbs"></select>

<select id="operation"></select>

<select id="part"></select>

<input id="qty" type="number" placeholder="Adet">

<button onclick="save()">Kaydet</button>

<div class="result" id="saveResult"></div>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw9BqUC77sdhJCPzmNvO3i-q_je8nF7UmlTz-ZA5gG6V_pIuSb-_P6zxNMSfoY2rLOd6w/exec"

let user=null

function post(data){

return fetch(API,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify(data)
}).then(r=>r.json())

}

function register(){

const fullName=document.getElementById("regFullName").value
const sicil=document.getElementById("regSicil").value
const password=document.getElementById("regPassword").value

post({
action:"register",
fullName,
sicil,
password
}).then(r=>{

if(r.success){

document.getElementById("registerResult").innerText="Kayıt başarılı"

}else{

document.getElementById("registerResult").innerText=r.error

}

})

}

function login(){

const sicil=document.getElementById("loginSicil").value
const password=document.getElementById("loginPassword").value

post({
action:"login",
sicil,
password
}).then(r=>{

if(r.success){

user=r.user

document.getElementById("authScreen").classList.add("hidden")
document.getElementById("appScreen").classList.remove("hidden")

loadOptions()

}else{

document.getElementById("loginResult").innerText=r.error

}

})

}

function loadOptions(){

post({
action:"getOptions"
}).then(r=>{

if(!r.success)return

fill("tv",r.filters.tvs)
fill("ship",r.filters.ships)
fill("swbs",r.filters.swbsList)
fill("operation",r.filters.operations)

})

}

function fill(id,list){

const el=document.getElementById(id)
el.innerHTML=""

list.forEach(v=>{
const o=document.createElement("option")
o.value=v
o.innerText=v
el.appendChild(o)
})

}

function save(){

const tv=document.getElementById("tv").value
const ship=document.getElementById("ship").value
const swbs=document.getElementById("swbs").value
const operation=document.getElementById("operation").value
const partNumber=document.getElementById("part").value
const qty=document.getElementById("qty").value

post({
action:"saveTransaction",
sicil:user.sicil,
tv,
ship,
swbs,
operation,
partNumber,
qty
}).then(r=>{

if(r.success){

document.getElementById("saveResult").innerText="Kayıt eklendi"

}else{

document.getElementById("saveResult").innerText=r.error

}

})

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
